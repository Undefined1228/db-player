name: Build Electron (Windows + Mac)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Electron app for Windows
        run: npm run build:win:ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-player-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Electron app for Mac (Apple Silicon)
        run: npm run build:mac:ci

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-player-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
          if-no-files-found: warn