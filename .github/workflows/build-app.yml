name: Build Electron (Windows + Mac)

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version --no-git-tag-version ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Electron app for Windows
        run: npm run build:win:ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-player-windows
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn
          retention-days: 3

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version --no-git-tag-version ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Electron app for Mac (Apple Silicon)
        run: npm run build:mac:ci

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-player-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
          if-no-files-found: warn
          retention-days: 3

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: db-player-windows
          path: release-assets/windows

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: db-player-mac
          path: release-assets/mac

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/${{ github.ref_name }}.md
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/windows/**/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}